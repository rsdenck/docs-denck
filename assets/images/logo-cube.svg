<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cubeGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00DC82;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#34F5C5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FF94;stop-opacity:1" />
    </linearGradient>
    <filter id="cubeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0B0F10"/>
  
  <!-- Outer cube frame -->
  <g transform="translate(200,200)">
    <!-- Top face -->
    <polygon points="-80,-80 0,-120 80,-80 0,-40" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="3" 
             filter="url(#cubeGlow)"/>
    
    <!-- Left face -->
    <polygon points="-80,-80 -80,80 0,120 0,-40" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="3" 
             filter="url(#cubeGlow)"/>
    
    <!-- Right face -->
    <polygon points="0,-40 80,-80 80,80 0,120" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="3" 
             filter="url(#cubeGlow)"/>
  </g>
  
  <!-- Middle cube frame -->
  <g transform="translate(200,200)">
    <!-- Top face -->
    <polygon points="-50,-50 0,-75 50,-50 0,-25" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="2" 
             filter="url(#cubeGlow)"/>
    
    <!-- Left face -->
    <polygon points="-50,-50 -50,50 0,75 0,-25" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="2" 
             filter="url(#cubeGlow)"/>
    
    <!-- Right face -->
    <polygon points="0,-25 50,-50 50,50 0,75" 
             fill="none" 
             stroke="url(#cubeGreen)" 
             stroke-width="2" 
             filter="url(#cubeGlow)"/>
  </g>
  
  <!-- Inner cube (solid) -->
  <g transform="translate(200,200)">
    <!-- Top face -->
    <polygon points="-25,-25 0,-37.5 25,-25 0,-12.5" 
             fill="url(#cubeGreen)" 
             stroke="url(#cubeGreen)" 
             stroke-width="1" 
             filter="url(#innerGlow)"/>
    
    <!-- Left face -->
    <polygon points="-25,-25 -25,25 0,37.5 0,-12.5" 
             fill="rgba(0,220,130,0.7)" 
             stroke="url(#cubeGreen)" 
             stroke-width="1" 
             filter="url(#innerGlow)"/>
    
    <!-- Right face -->
    <polygon points="0,-12.5 25,-25 25,25 0,37.5" 
             fill="rgba(0,220,130,0.5)" 
             stroke="url(#cubeGreen)" 
             stroke-width="1" 
             filter="url(#innerGlow)"/>
  </g>
  
  <!-- Connection lines -->
  <g transform="translate(200,200)">
    <line x1="0" y1="-120" x2="0" y2="-37.5" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
    <line x1="80" y1="-80" x2="25" y2="-25" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
    <line x1="80" y1="80" x2="25" y2="25" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
    <line x1="0" y1="120" x2="0" y2="37.5" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
    <line x1="-80" y1="80" x2="-25" y2="25" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
    <line x1="-80" y1="-80" x2="-25" y2="-25" stroke="url(#cubeGreen)" stroke-width="1" opacity="0.6" filter="url(#innerGlow)"/>
  </g>
</svg>